{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Quantum DDoS Detection</title>

    <style>
        body {
            background: url("{% static 'bg.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
        }

        .box {
            background: white;
            width: 500px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #8B0000;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Quantum-Based DDoS Detection</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="input_value" placeholder="Enter Traffic Value (0 - 1)" required>
        <br><br>
        <button type="submit">Run Quantum Detection</button>
    </form>
</div>

</body>
</html>
